# Nginx Configuration Snippet for Journal Redirects & Canonicalization
# Location: /etc/nginx/conf.d/kirthidiamonds.conf (or included in your server block)

# 301 Redirects for broken short-slugs to canonical long-slugs
rewrite ^/journal/gia-vs-igi-certified-diamonds-india-guide/?$ /journal/gia-vs-igi-certified-diamonds-which-should-you-choose-when-buying-in-india permanent;
rewrite ^/journal/diamond-jewellery-vs-gold-investment-kerala/?$ /journal/diamond-jewellery-vs-gold-as-an-investment-in-kerala-what-you-need-to-know permanent;
rewrite ^/journal/artisanal-vs-mass-produced-diamond-jewellery/?$ /journal/artisanal-diamond-jewellery-vs-mass-produced-what-is-the-real-difference permanent;

# Additional fallback redirects for other paths
rewrite ^/journal/investment-grade-diamond-jewellery-guide/?$ /journal/investment-grade-diamond-jewellery-a-complete-buyer-s-guide-for-india permanent;
rewrite ^/journal/antique-diamond-jewellery-kerala-traditional-weddings/?$ /journal/antique-diamond-jewellery-designs-for-traditional-kerala-weddings permanent;
rewrite ^/journal/onam-2026-diamond-jewellery-guide-what-to-buy-and-where-in-kerala/?$ /journal permanent;

# Catch-all rule for /journal/* to prevent homepage content fallback
location /journal/ {
    # If proxying to Node SSR, let the Node app handle the 404, or intercept it here
    # proxy_pass http://localhost:3000;
    
    # If serving statically:
    try_files $uri $uri/ =404;
}
